name: Claude PR Review

# Auto-reviews every PR using the Claude GitHub App, plus responds to
# `@claude` mentions in PR comments. Independent of the main `ci.yml`
# workflow; failures here don't gate merges.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  # @claude mentions in PR comments and review threads. The `if:` guard
  # below keeps the workflow from running on issue-comments outside of
  # PRs and on comments that don't address Claude.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-flight reviews when new COMMITS are pushed (so we don't
# review a stale revision) — but NOT when comment events fire.
#
# Comment-triggered runs (`issue_comment`, `pull_request_review_comment`)
# share the same concurrency group as `pull_request` runs. Without the
# event-aware `cancel-in-progress`, every comment on a PR — even bot
# threads or replies the workflow's `if:` guard would skip — would
# cancel an in-flight pull_request review on the same ref. That's how
# four laconic replies on review threads accidentally killed PR-90's
# real review run.
#
# With this expression, only `pull_request` events (= new pushes) cancel
# in-flight runs. Comment events queue behind / run alongside, and any
# without `@claude` get filtered out by the job-level `if:` guard
# anyway.
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  claude-review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Shallow clone — review only needs the diff, not full history.
          fetch-depth: 1

      # `issue_comment` and `pull_request_review_comment` events run
      # against the default branch (main), not the PR's HEAD — that's
      # how GitHub dispatches comment-triggered workflows. Without this
      # step, Claude is staring at `main` and has to discover the PR's
      # contents via repeated `gh pr diff` / `gh api` calls, burning
      # max-turns before it can post anything. Switch to the PR branch
      # so Claude sees the actual diff in the working tree.
      - name: Checkout PR branch when triggered by comment
        if: |
          github.event_name == 'issue_comment' ||
          github.event_name == 'pull_request_review_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh pr checkout "$PR_NUMBER"

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # Pass both auth modes — the action picks whichever secret is set.
          # ANTHROPIC_API_KEY is raw API billing; CLAUDE_CODE_OAUTH_TOKEN is
          # what `/install-github-app` populates and uses App billing.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number || github.event.issue.number }}. Focus on real-impact issues:
            - Auth/security: bypass, injection, missing tenant scoping, credential leak, SSRF
            - Concurrency: races, deadlocks, transactional gaps
            - Missing tests for new behavior
            - Concrete bugs at file:line — name the failure mode

            Skip nits, style, theoretical issues. If nothing substantive, exit silently.
            Inline comments only — no top-level summary.
          # `mcp__github_inline_comment__create_inline_comment` is the
          # MCP-bridged tool the action uses to buffer inline review
          # comments. Without it explicitly allow-listed, Claude's tool
          # calls get denied and the action exits with "No buffered inline
          # comments" — silently producing nothing visible.
          #
          # `gh pr diff` and `gh pr view` are read-only fallbacks for
          # exploratory navigation. We deliberately do NOT allow
          # `gh pr comment` (would enable top-level summaries we've
          # explicitly disabled in the prompt) or `gh api:*` (supports
          # `-X POST/PATCH/DELETE` so the wildcard would let Claude
          # mutate any GitHub resource the workflow's GITHUB_TOKEN can
          # touch — including posting top-level PR comments via
          # `gh api repos/.../issues/.../comments`, defeating the same
          # constraint).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 25

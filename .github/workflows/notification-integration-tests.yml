name: Notification Integration Tests

# This workflow runs integration tests for notification channels with real external services
# Runs on schedule (daily) and can be triggered manually
# Requires repository secrets for test credentials

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Test email notifications'
        required: false
        type: boolean
        default: true
      test_slack:
        description: 'Test Slack notifications'
        required: false
        type: boolean
        default: true
      test_discord:
        description: 'Test Discord notifications'
        required: false
        type: boolean
        default: true
      test_teams:
        description: 'Test Teams notifications'
        required: false
        type: boolean
        default: true
      test_webhook:
        description: 'Test generic webhooks'
        required: false
        type: boolean
        default: true

jobs:
  notification-integration-tests:
    name: Test Notification Delivery
    runs-on: ubuntu-latest

    # Only run if secrets are configured
    if: >
      github.event_name == 'schedule' || 
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @bugspotter/types run build

      - name: Run Email Integration Tests
        if: >
          (github.event_name == 'schedule' || github.event.inputs.test_email == 'true')
        env:
          RUN_INTEGRATION_TESTS: 'true'
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          # Note: Port 587 uses STARTTLS (secure=false), Port 465 uses SSL (secure=true)
          SMTP_SECURE: ${{ secrets.SMTP_SECURE || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          echo "🧪 Testing Email (SMTP) notifications..."
          pnpm --filter @bugspotter/backend run test:notifications:email
        continue-on-error: true

      - name: Run Slack Integration Tests
        if: >
          (github.event_name == 'schedule' || github.event.inputs.test_slack == 'true')
        env:
          RUN_INTEGRATION_TESTS: 'true'
          SLACK_TEST_WEBHOOK_URL: ${{ secrets.SLACK_TEST_WEBHOOK_URL }}
          SLACK_TEST_CHANNEL: ${{ secrets.SLACK_TEST_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEST_CHANNEL_ID: ${{ secrets.SLACK_TEST_CHANNEL_ID }}
        run: |
          echo "🧪 Testing Slack notifications..."
          pnpm --filter @bugspotter/backend run test:notifications:slack
        continue-on-error: true

      - name: Run Discord Integration Tests
        if: >
          (github.event_name == 'schedule' || github.event.inputs.test_discord == 'true')
        env:
          RUN_INTEGRATION_TESTS: 'true'
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_TEST_CHANNEL_ID: ${{ secrets.DISCORD_TEST_CHANNEL_ID }}
        run: |
          echo "🧪 Testing Discord notifications..."
          pnpm --filter @bugspotter/backend run test:notifications:discord
        continue-on-error: true

      - name: Run Teams Integration Tests
        if: >
          (github.event_name == 'schedule' || github.event.inputs.test_teams == 'true')
        env:
          RUN_INTEGRATION_TESTS: 'true'
          TEAMS_TEST_WEBHOOK_URL: ${{ secrets.TEAMS_TEST_WEBHOOK_URL }}
        run: |
          echo "🧪 Testing Microsoft Teams notifications..."
          pnpm --filter @bugspotter/backend run test:notifications:teams
        continue-on-error: true

      - name: Run Webhook Integration Tests
        if: >
          (github.event_name == 'schedule' || github.event.inputs.test_webhook == 'true')
        env:
          RUN_INTEGRATION_TESTS: 'true'
          WEBHOOK_TEST_URL: ${{ secrets.WEBHOOK_TEST_URL }}
        run: |
          echo "🧪 Testing generic webhook notifications..."
          pnpm --filter @bugspotter/backend run test:notifications:webhook
        continue-on-error: true

      - name: Generate test report
        if: always()
        run: |
          echo "## Notification Integration Test Results" > test-results.md
          echo "" >> test-results.md
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-results.md
          echo "**Trigger**: ${{ github.event_name }}" >> test-results.md
          echo "" >> test-results.md

          # Add results summary (can be enhanced with actual test result parsing)
          echo "### Summary" >> test-results.md
          echo "Tests completed. Check individual job steps for details." >> test-results.md

          cat test-results.md

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-integration-test-results
          path: |
            test-results.md
            packages/backend/coverage/
          retention-days: 30

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Notification Integration Tests Failed',
              body: `
                The scheduled notification integration tests have failed.
                
                **Run**: ${context.runId}
                **Workflow**: ${context.workflow}
                **Date**: ${new Date().toISOString()}
                
                Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.
                
                This may indicate:
                - Expired credentials
                - Service outages
                - Breaking changes in external APIs
                - Network connectivity issues
              `,
              labels: ['bug', 'notifications', 'automation']
            });

  health-check:
    name: Notification Health Check
    runs-on: ubuntu-latest
    needs: [notification-integration-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Integration tests completed."
          echo "Results available in artifacts."

          # Future enhancement: Parse test results and update status dashboard
          # This could integrate with:
          # - Status page (e.g., status.example.com)
          # - Monitoring dashboard (Grafana, Datadog)
          # - Internal documentation

      - name: Summary
        run: |
          echo "## Notification Integration Tests Summary"
          echo ""
          echo "✅ Tests executed"
          echo "📊 Results uploaded to artifacts"
          echo "🔔 Alerts configured for failures"
